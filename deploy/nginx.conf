# Example nginx reverse proxy for Driftbox.
# nginx serves the static build directly (fast, cache-friendly) and proxies the
# /api/* routes to the Node process bound on 127.0.0.1:8787.
#
# Put this in /etc/nginx/sites-available/driftbox and symlink into sites-enabled.

server {
    listen 80;
    server_name your.domain.example;   # <-- change me

    root /opt/driftbox/dist;
    index index.html;

    # Long-cache the content-hashed assets Vite emits.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback.
    location / {
        try_files $uri /index.html;
    }
}

# After installing a TLS cert (e.g. certbot), nginx will add the :443 server
# block automatically. The Node process never needs to handle TLS itself.
